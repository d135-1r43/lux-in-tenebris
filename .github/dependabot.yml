version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    # Keep in sync with pnpm's minimumReleaseAge supply-chain policy
    # (pnpm 11 default: 24h). Don't open PRs until packages are old
    # enough to pass `pnpm install --frozen-lockfile` in CI.
    cooldown:
      default-days: 1
    groups:
      # Group SvelteKit and related packages
      svelte:
        patterns:
          - 'svelte*'
          - '@sveltejs/*'
      # Group development dependencies
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5

  # Enable version updates for Docker
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5

version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    # Stay ahead of pnpm's minimumReleaseAge supply-chain policy
    # (pnpm 11 default: 24h). Cooldown is counted in whole days while
    # pnpm checks the exact 24h cutoff, so 2 days gives a safe margin and
    # ensures packages are old enough to pass `pnpm install --frozen-lockfile`.
    cooldown:
      default-days: 2
    groups:
      # Group SvelteKit and related packages
      svelte:
        patterns:
          - 'svelte*'
          - '@sveltejs/*'
      # Group development dependencies
      dev-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5

  # Enable version updates for Docker
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
